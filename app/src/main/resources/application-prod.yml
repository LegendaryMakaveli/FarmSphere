spring:
  profiles:
    active: prod

  datasource:
    url: ${spring.datasource.url:}
    username: ${spring.datasource.username:}
    password: ${spring.datasource.password:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${spring.mail.username:}
    password: ${spring.mail.password:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  servlet:
    multipart:
          max-file-size: 10MB
          max-request-size: 50MB
          enabled: true
  security:
    user:
          name: ${spring.security.user.name:}

app:
  admin:
    email: ${app.admin.email:}
    name: ${app.admin.name:Admin}
    password: ${app.admin.password:}
    phoneNumber: ${app.admin.phoneNumber:}
    address: ${app.admin.address:}

  services:
    farming:
      url: ${services.farming.url:}

  cors:
    allowed:
      origins: ${cors.allowed.origins:}


jwt:
  secret: ${jwt.secret:}
  expiration: ${jwt.expiration:86400000}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false
  tomcat:
    max-http-form-post-size: 10MB


logging:
  level:
    root: INFO
    com.farmsphere: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /tmp/farmsphere.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

info:
  app:
    name: FarmSphere
    version: 0.0.1-SNAPSHOT
    env: ${SPRING_PROFILES_ACTIVE:local}